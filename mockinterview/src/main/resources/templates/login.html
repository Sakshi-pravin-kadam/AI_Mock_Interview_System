<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minternviewer Login</title>

    <link rel="stylesheet" href="/css/login.css">
</head>

<body>

<!-- Animated Background -->
<canvas id="bg"></canvas>

<div class="container">

    <div class="logo">
        <div class="icon">🧠</div>
        <h2>AI Interview Platform</h2>
    </div>

    <div class="login-card">

        <h1>Welcome back!</h1>
        <p class="subtitle">Ready to ace your next interview?</p>

        <form id="loginForm">

            <label>Email</label>
            <input
                    type="email"
                    id="email"
                    placeholder="you@example.com"
                    required
            >

            <div class="password-row">
                <label>Password</label>
                <a href="#">Forgot password?</a>
            </div>

            <input
                    type="password"
                    id="password"
                    placeholder="••••••••"
                    required
            >

            <button type="submit" class="signin">
                Sign In
            </button>

            <div class="divider">
                <span>or</span>
            </div>

            <button type="button" class="google">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg">
                Sign in with Google
            </button>

            <p class="signup">
                Don't have an account?
                <a href="signup.html">Sign up</a>
            </p>

        </form>

    </div>

    <p class="footer">Powered by AI • Secure & Private</p>

</div>

<script src="/js/login.js"></script>

</body>
</html>
